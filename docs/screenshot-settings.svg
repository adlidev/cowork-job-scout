<svg width="900" height="720" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
<!-- background -->
<rect width="900" height="720" fill="#f0f4f8"/>

<!-- header card -->
<rect x="16" y="16" width="868" height="64" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1"/>
<text x="32" y="56" font-size="19" fill="#1A3A5C" font-weight="700">🎯 Job Match Dashboard</text>
<rect x="710" y="26" width="158" height="22" fill="#dbeafe" rx="12"/>
<text x="789" y="41" font-size="11" fill="#1d4ed8" font-weight="600" text-anchor="middle">📅 Daily · auto-updated</text>

<!-- subtitle -->
<text x="20" y="101" font-size="12" fill="#888">Configure your search preferences</text>

<!-- tab bar -->
<rect x="16" y="112" width="868" height="40" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
<text x="67" y="136" font-size="12.5" fill="#64748b" text-anchor="middle">Matches</text>
<text x="194" y="136" font-size="12.5" fill="#64748b" text-anchor="middle">Job Search Log</text>
<text x="320" y="136" font-size="12.5" fill="#64748b" text-anchor="middle">Resumes</text>
<rect x="372" y="116" width="114" height="32" fill="#1A3A5C" rx="6"/>
<text x="429" y="136" font-size="12.5" fill="#fff" font-weight="600" text-anchor="middle">⚙ Settings</text>

<!-- ── YOUR PROFILE ──────────────────────────────── -->
<rect x="16" y="162" width="868" height="130" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1"/>
<text x="30" y="182" font-size="10" fill="#1A3A5C" font-weight="700" letter-spacing="0.5">YOUR PROFILE</text>

<!-- name + location inputs -->
<text x="30" y="202" font-size="11" fill="#64748b" font-weight="600">Your Name</text>
<rect x="30" y="208" width="200" height="26" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="42" y="225" font-size="12" fill="#9ca3af">e.g. Jane Smith</text>

<text x="244" y="202" font-size="11" fill="#64748b" font-weight="600">Location</text>
<rect x="244" y="208" width="200" height="26" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="256" y="225" font-size="12" fill="#9ca3af">e.g. Austin, TX</text>

<!-- profile textarea -->
<text x="30" y="248" font-size="11" fill="#64748b" font-weight="600">Brief Skills Summary <tspan fill="#94a3b8" font-weight="400">(sent to AI scorer)</tspan></text>
<rect x="30" y="254" width="824" height="30" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="42" y="273" font-size="11" fill="#9ca3af">Describe your background, key skills, years of experience, tools, and what roles you're targeting…</text>

<!-- ── JOB PREFERENCES ───────────────────────────── -->
<rect x="16" y="304" width="868" height="212" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1"/>
<text x="30" y="324" font-size="10" fill="#1A3A5C" font-weight="700" letter-spacing="0.5">JOB PREFERENCES</text>

<!-- work arrangement checkboxes -->
<rect x="30" y="332" width="12" height="12" fill="#1A3A5C" rx="2"/>
<text x="46" y="343" font-size="12" fill="#374151">Remote</text>
<rect x="112" y="332" width="12" height="12" fill="#1A3A5C" rx="2"/>
<text x="128" y="343" font-size="12" fill="#374151">Hybrid</text>
<rect x="186" y="332" width="12" height="12" fill="white" rx="2" stroke="#94a3b8" stroke-width="1"/>
<text x="202" y="343" font-size="12" fill="#374151">On-site</text>

<!-- commute range -->
<text x="30" y="366" font-size="11" fill="#64748b" font-weight="600">Commute Range (miles) <tspan fill="#94a3b8" font-weight="400">for hybrid &amp; on-site</tspan></text>
<rect x="30" y="372" width="80" height="24" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="42" y="388" font-size="12" fill="#9ca3af">e.g. 25</text>

<!-- min salary -->
<text x="150" y="366" font-size="11" fill="#64748b" font-weight="600">Minimum Salary (annual, 0 = no filter)</text>
<rect x="150" y="372" width="130" height="24" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="162" y="388" font-size="12" fill="#9ca3af">e.g. 80000</text>
<!-- hide no salary checkbox -->
<rect x="150" y="402" width="11" height="11" fill="white" rx="2" stroke="#94a3b8" stroke-width="1"/>
<text x="165" y="412" font-size="11" fill="#374151">Hide jobs with no salary listed</text>

<!-- defense preference -->
<text x="330" y="366" font-size="11" fill="#64748b" font-weight="600">Defense Roles</text>
<text x="330" y="388" font-size="11.5" fill="#374151">⊙ Penalize  ○ Exclude  ○ Include</text>

<!-- local metro cities -->
<text x="30" y="432" font-size="11" fill="#64748b" font-weight="600">Local Metro Cities <tspan fill="#94a3b8" font-weight="400">— hybrid &amp; on-site roles outside this list are excluded</tspan></text>
<text x="30" y="446" font-size="10.5" fill="#94a3b8">Comma-separated. Auto-fill uses your Location + Commute Range above.</text>
<rect x="30" y="452" width="500" height="22" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="42" y="467" font-size="11" fill="#9ca3af">e.g. austin, round rock, pflugerville, cedar park, georgetown…</text>
<rect x="544" y="450" width="214" height="26" fill="white" rx="5" stroke="#94a3b8" stroke-width="1"/>
<text x="651" y="467" font-size="11" fill="#475569" text-anchor="middle">🗺 Auto-fill from location &amp; commute range</text>

<!-- ── SEARCH TERMS ────────────────────────────── -->
<rect x="16" y="528" width="868" height="130" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1"/>
<text x="30" y="548" font-size="10" fill="#1A3A5C" font-weight="700" letter-spacing="0.5">SEARCH TERMS</text>
<text x="108" y="548" font-size="10" fill="#94a3b8" font-weight="400">(applied to Dice, Indeed, and ZipRecruiter)</text>

<rect x="30" y="554" width="824" height="68" fill="#f8fafc" rx="5" stroke="#e2e8f0" stroke-width="1"/>
<text x="42" y="572" font-size="11.5" fill="#374151">senior QA engineer</text>
<text x="42" y="589" font-size="11.5" fill="#374151">SDET</text>
<text x="42" y="606" font-size="11.5" fill="#374151">test automation engineer</text>
<text x="260" y="572" font-size="11.5" fill="#374151">quality engineer python</text>
<text x="260" y="589" font-size="11.5" fill="#374151">staff engineer in test</text>

<!-- advanced toggle -->
<text x="30" y="638" font-size="11" fill="#475569">▸ Advanced — per-service overrides (Dice / Indeed / ZipRecruiter)</text>

<!-- ── SAVE BUTTON ─────────────────────────────── -->
<rect x="16" y="658" width="152" height="36" fill="#1A3A5C" rx="8"/>
<text x="92" y="680" font-size="13" fill="white" font-weight="600" text-anchor="middle">Save Settings</text>
<rect x="178" y="658" width="130" height="36" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
<text x="243" y="680" font-size="12" fill="#dc2626" text-anchor="middle">Reset to Defaults</text>
</svg>
